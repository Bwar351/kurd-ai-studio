<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurd AI Studio - بوار</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 600px; margin-top: 50px; }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        p { font-size: 1.3rem; margin: 15px 0; opacity: 0.9; }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
        .form-section {
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px 20px;
            margin: 50px auto;
        }
        .form-section h2 {
            margin-bottom: 30px;
            font-size: 2rem;
        }
        iframe {
            border: 0;
            border-radius: 10px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kurd AI Studio</h1>
